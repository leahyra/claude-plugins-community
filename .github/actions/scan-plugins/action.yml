name: Scan Plugins
description: >
  Claude-based policy/safety scan of changed external marketplace entries.
  Clones each changed entry at its pinned SHA, runs Claude headless against
  policy/prompt.md, and reports verdicts as inline annotations and a step
  summary. Non-blocking by default (warnings); set fail-on-findings to make
  policy violations fail the job. Bot-free: needs only Anthropic API auth —
  either an ANTHROPIC_API_KEY secret or Workload Identity Federation inputs
  (the latter requires `permissions: id-token: write` on the calling job).

inputs:
  anthropic-api-key:
    description: >
      Static API key for Claude. If neither this nor
      anthropic-federation-rule-id is set, the scan is skipped (graceful no-op).
    default: ""
  anthropic-federation-rule-id:
    description: >
      Anthropic Workload Identity Federation rule ID (fdrl_...). When set,
      the action mints a GitHub OIDC token and the claude CLI exchanges it
      for a short-lived access token — no static API key needed. The calling
      job must grant `permissions: id-token: write`. Takes precedence over
      anthropic-api-key when both are set.
    default: ""
  anthropic-organization-id:
    description: Anthropic organization UUID the federation rule is bound to. Required when anthropic-federation-rule-id is set.
    default: ""
  anthropic-service-account-id:
    description: Anthropic service account ID (svac_...) bound to the federation rule. Required when anthropic-federation-rule-id is set.
    default: ""
  marketplace-path:
    description: Path to marketplace.json
    default: .claude-plugin/marketplace.json
  base-ref:
    description: Git ref to diff against for change detection
    default: ${{ github.event.pull_request.base.sha || github.event.before || 'origin/main' }}
  fail-on-findings:
    description: If true, a `passes:false` verdict fails the job. Default false (annotate-only).
    default: "false"
  scan-all-external:
    description: Scan EVERY external entry, not just changed ones. For nightly full sweeps.
    default: "false"
  policy-prompt:
    description: Path to the policy prompt markdown. Override to point at a repo-local prompt.
    default: ""
  allowed-hosts:
    description: Space-separated allowlist of git hosts to clone from (SSRF guard).
    default: "github.com gitlab.com bitbucket.org"
  claude-cli-version:
    description: Version of @anthropic-ai/claude-code to install
    default: latest
  npm-registry:
    description: Optional npm registry URL for tooling installs
    default: ""
  scan-timeout-secs:
    description: Per-plugin timeout for the Claude scan
    default: "300"

outputs:
  scanned:
    description: JSON array of {name, passes, summary, violations, may_make_external_network_calls, may_download_additional_software}
    value: ${{ steps.scan.outputs.scanned }}
  failed:
    description: JSON array of plugin names that failed policy
    value: ${{ steps.scan.outputs.failed }}
  result:
    description: pass | fail | skipped
    value: ${{ steps.scan.outputs.result }}

runs:
  using: composite
  steps:
    - name: Setup
      shell: bash
      env:
        HAS_API_KEY: ${{ inputs.anthropic-api-key != '' }}
        HAS_WIF: ${{ inputs.anthropic-federation-rule-id != '' }}
      run: |
        set -euo pipefail
        echo "ACTION_PATH=${{ github.action_path }}" >> "$GITHUB_ENV"
        echo "VALIDATE_LIB=${{ github.action_path }}/../validate-plugins/lib/common.sh" >> "$GITHUB_ENV"
        chmod +x "${{ github.action_path }}/scripts/"*.sh
        if [[ "$HAS_API_KEY" == "true" || "$HAS_WIF" == "true" ]]; then
          echo "SCAN_HAS_AUTH=true" >> "$GITHUB_ENV"
        else
          echo "SCAN_HAS_AUTH=false" >> "$GITHUB_ENV"
        fi

    - name: Skip if no Anthropic auth configured
      if: env.SCAN_HAS_AUTH != 'true'
      shell: bash
      run: |
        echo "::notice::scan-plugins: no Anthropic auth (anthropic-api-key or anthropic-federation-rule-id) configured; skipping policy scan."
        echo "result=skipped" >> "$GITHUB_OUTPUT"

    - name: Install jq
      if: env.SCAN_HAS_AUTH == 'true'
      shell: bash
      run: command -v jq >/dev/null || sudo apt-get install -y jq

    - name: Mint GitHub OIDC token (Workload Identity Federation)
      if: inputs.anthropic-federation-rule-id != ''
      shell: bash
      env:
        WIF_RULE_ID: ${{ inputs.anthropic-federation-rule-id }}
        WIF_ORG_ID: ${{ inputs.anthropic-organization-id }}
        WIF_SVAC_ID: ${{ inputs.anthropic-service-account-id }}
      run: |
        set -euo pipefail
        : "${WIF_ORG_ID:?anthropic-organization-id is required when anthropic-federation-rule-id is set}"
        : "${WIF_SVAC_ID:?anthropic-service-account-id is required when anthropic-federation-rule-id is set}"
        : "${ACTIONS_ID_TOKEN_REQUEST_URL:?permissions: id-token: write is required on the calling job for WIF}"
        TOKEN_FILE="$RUNNER_TEMP/anthropic-gha-jwt"
        CURL_CFG="$RUNNER_TEMP/anthropic-gha-jwt.curlcfg"
        (umask 077; printf 'header = "Authorization: Bearer %s"\n' \
          "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > "$CURL_CFG")
        unset ACTIONS_ID_TOKEN_REQUEST_TOKEN
        fetch_jwt() {
          curl -fsS --retry 3 --retry-delay 2 -K "$CURL_CFG" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https%3A%2F%2Fapi.anthropic.com" \
            | jq -erj .value
        }
        (umask 077; fetch_jwt > "$TOKEN_FILE")
        echo "::add-mask::$(cat "$TOKEN_FILE")"
        # Background refresh: GHA OIDC JWTs are ~5min TTL; the claude CLI
        # re-reads the token file when its exchanged bearer nears expiry, so
        # long scan loops (>5min total) need the file to stay fresh.
        ( while sleep 240; do
            [ -f "$CURL_CFG" ] || exit 0
            J="$(fetch_jwt)" && [ -n "$J" ] || continue
            (umask 077; printf '%s' "$J" > "$TOKEN_FILE.tmp")
            mv -f "$TOKEN_FILE.tmp" "$TOKEN_FILE"
          done ) </dev/null >/dev/null 2>&1 & disown
        {
          echo "ANTHROPIC_FEDERATION_RULE_ID=$WIF_RULE_ID"
          echo "ANTHROPIC_ORGANIZATION_ID=$WIF_ORG_ID"
          echo "ANTHROPIC_SERVICE_ACCOUNT_ID=$WIF_SVAC_ID"
          echo "ANTHROPIC_IDENTITY_TOKEN_FILE=$TOKEN_FILE"
        } >> "$GITHUB_ENV"

    - name: Install Node
      if: env.SCAN_HAS_AUTH == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Configure npm registry
      if: env.SCAN_HAS_AUTH == 'true' && inputs.npm-registry != ''
      shell: bash
      env:
        NPM_REGISTRY: ${{ inputs.npm-registry }}
      run: npm config set registry "$NPM_REGISTRY"

    - name: Install claude CLI
      if: env.SCAN_HAS_AUTH == 'true'
      shell: bash
      env:
        CLAUDE_CLI_VERSION: ${{ inputs.claude-cli-version }}
      run: |
        set -euo pipefail
        npm install -g "@anthropic-ai/claude-code@${CLAUDE_CLI_VERSION}"
        claude --version

    - name: Scan
      if: env.SCAN_HAS_AUTH == 'true'
      id: scan
      shell: bash
      env:
        # On the WIF path this is empty; the claude CLI reads the
        # ANTHROPIC_FEDERATION_* / _IDENTITY_TOKEN_FILE env exported by
        # the mint step above instead. scan.sh's auth guard accepts either.
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        MARKETPLACE_PATH: ${{ inputs.marketplace-path }}
        BASE_REF: ${{ inputs.base-ref }}
        FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
        SCAN_ALL_EXTERNAL: ${{ inputs.scan-all-external }}
        POLICY_PROMPT: ${{ inputs.policy-prompt }}
        ALLOWED_HOSTS: ${{ inputs.allowed-hosts }}
        SCAN_TIMEOUT_SECS: ${{ inputs.scan-timeout-secs }}
      run: "$ACTION_PATH/scripts/scan.sh"
